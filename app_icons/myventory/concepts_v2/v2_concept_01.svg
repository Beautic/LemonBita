<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D11" />
      <stop offset="100%" stop-color="#1A1B26" />
    </linearGradient>
    <linearGradient id="gem-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5A43" />
      <stop offset="50%" stop-color="#DE3B26" />
      <stop offset="100%" stop-color="#801005" />
    </linearGradient>
    <linearGradient id="gem-flash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glass-reflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg-grad)" />

  <circle cx="256" cy="270" r="80" fill="#DE3B26" opacity="0.25" filter="url(#glow)"/>
  <polygon points="120,380 392,380 340,430 172,430" fill="#2E303F" opacity="0.8"/>
  <polygon points="120,380 392,380 392,390 120,390" fill="#4B4E68" />

  <g transform="translate(256, 260)">
    <polygon points="0,-90 70,-30 40,50 -40,50 -70,-30" fill="#500802"/>
    <polygon points="0,-80 60,-25 35,45 -35,45 -60,-25" fill="url(#gem-grad)"/>
    <polygon points="0,-80 30,-25 0,-10 -30,-25" fill="#FF7B68" opacity="0.6"/>
    <polygon points="-30,-25 0,-10 -35,45" fill="#FF8D7D" opacity="0.3"/>
    <polygon points="30,-25 0,-10 35,45" fill="#A81B0C" opacity="0.5"/>
    <polygon points="-60,-25 -30,-25 -35,45" fill="#FF5A43" opacity="0.4"/>
    <polygon points="60,-25 30,-25 35,45" fill="#5C0D05" opacity="0.7"/>
    <polygon points="0,-80 60,-25 0,-10" fill="url(#gem-flash)" opacity="0.5"/>
  </g>

  <polygon points="150,130 362,130 392,380 120,380" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="3"/>
  <polygon points="120,100 392,100 392,380 120,380" fill="url(#glass-reflect)" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="4" stroke-linejoin="round"/>
  <line x1="120" y1="100" x2="120" y2="380" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="6"/>
  <line x1="120" y1="100" x2="392" y2="100" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="4"/>

  <circle cx="392" cy="100" r="16" fill="#DE3B26" stroke="#FFFFFF" stroke-width="4"/>
  <path d="M386 100 H398 M392 94 V106" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
</svg>
