<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 트로피 전용 럭셔리 다크 퍼플 배경 -->
    <radialGradient id="trophy-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#211E2A" />
      <stop offset="100%" stop-color="#0A090F" />
    </radialGradient>

    <!-- 골드 리치 그라디언트 -->
    <linearGradient id="trophy-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEFA6" />
      <stop offset="30%" stop-color="#E2B14C" />
      <stop offset="70%" stop-color="#BD8B26" />
      <stop offset="100%" stop-color="#7B560C" />
    </linearGradient>

    <filter id="trophy-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="108" fill="url(#trophy-bg)"/>

  <!-- 배경의 격자 인벤토리 수집 가이드선 -->
  <g stroke="#2C283B" stroke-width="8" stroke-linecap="round">
    <line x1="120" y1="180" x2="392" y2="180"/>
    <line x1="120" y1="280" x2="392" y2="280"/>
    <line x1="120" y1="380" x2="392" y2="380"/>
  </g>

  <!-- 골드 트로피 글로우 백그라운드 -->
  <circle cx="256" cy="220" r="80" fill="#E2B14C" opacity="0.15" filter="url(#trophy-glow)"/>

  <!-- 1. 3D 원형 쇼케이스 전시대 (Trophy Stand) -->
  <ellipse cx="256" cy="390" rx="120" ry="30" fill="#1C1824" stroke="#2C283B" stroke-width="6"/>
  <ellipse cx="256" cy="380" rx="120" ry="30" fill="url(#trophy-gold)" stroke="#0A090F" stroke-width="4"/>
  <!-- 전시대 내부 플레이트 -->
  <ellipse cx="256" cy="380" rx="100" ry="22" fill="#2E263D"/>

  <!-- 2. 황금 트로피 본체 (Trophy) -->
  <g stroke="#0A090F" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- 받침 기둥 -->
    <path d="M226,380 V320 H286 V380 Z" fill="url(#trophy-gold)"/>
    <polygon points="216,320 296,320 286,290 226,290" fill="url(#trophy-gold)"/>
    
    <!-- 트로피 손잡이 (좌, 우) -->
    <path d="M190,170 C160,170 160,240 210,250" fill="none" stroke="url(#trophy-gold)" stroke-width="16"/>
    <path d="M322,170 C352,170 352,240 302,250" fill="none" stroke="url(#trophy-gold)" stroke-width="16"/>

    <!-- 메인 컵 바디 -->
    <path d="M196,160 C196,250 226,290 256,290 C286,290 316,250 316,160 Z" fill="url(#trophy-gold)"/>
    <!-- 메인 컵 림 (윗 테두리) -->
    <ellipse cx="256" cy="160" rx="60" ry="12" fill="#FFF3BE" stroke="#0A090F" stroke-width="4"/>
  </g>

  <!-- 3. 트로피 중앙의 메인 컬렉션 엠블럼: 별 (Signal Red #DE3B26) -->
  <g transform="translate(256, 215) scale(0.9)" filter="url(#trophy-glow)">
    <polygon points="0,-36 10,-10 36,-10 16,6 24,32 0,16 -24,32 -16,6 -36,-10 -10,-10" fill="#DE3B26" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
  </g>
</svg>
