<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="card-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1E2330" />
      <stop offset="100%" stop-color="#0B0D13" />
    </radialGradient>
    <linearGradient id="holo-rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF00A0" />
      <stop offset="20%" stop-color="#FF7B00" />
      <stop offset="40%" stop-color="#FFFB00" />
      <stop offset="60%" stop-color="#00FF51" />
      <stop offset="80%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    <linearGradient id="card-shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3" />
    </linearGradient>
    <filter id="card-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#card-bg)"/>

  <rect x="136" y="96" width="240" height="320" rx="24" fill="none" stroke="#252C3E" stroke-width="8" stroke-dasharray="16 8"/>

  <rect x="146" y="116" width="220" height="290" rx="20" fill="#000000" opacity="0.5" filter="url(#card-glow)"/>

  <g transform="rotate(-4, 256, 256)">
    <rect x="146" y="106" width="220" height="290" rx="20" fill="url(#holo-rainbow)" stroke="#FFFFFF" stroke-width="4"/>
    <rect x="146" y="106" width="220" height="290" rx="20" fill="url(#card-shine)"/>
    <rect x="162" y="122" width="188" height="258" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2"/>
    <polygon points="256,170 273,205 311,210 283,237 290,275 256,257 222,275 229,237 201,210 239,205" fill="#DE3B26" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" filter="url(#card-glow)"/>
    <polygon points="256,182 268,208 296,212 275,232 280,260 256,246 232,260 237,232 216,212 244,208" fill="#FF7D6B"/>
    <rect x="180" y="300" width="152" height="12" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="180" y="320" width="100" height="8" rx="3" fill="#FFFFFF" fill-opacity="0.2"/>
    <circle cx="324" cy="324" r="6" fill="#FFFFFF" fill-opacity="0.4"/>
  </g>
</svg>
