<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="108" fill="#141824"/>
  
  <!-- 첫 번째 베이스 슬롯 (소프트 그레이 면과 굵은 테두리) -->
  <rect x="130" y="130" width="200" height="200" rx="32" fill="#1C2333" stroke="#ECEFF4" stroke-width="16" stroke-linejoin="round"/>
  
  <!-- 두 번째 레이어 슬롯 (사선으로 오버랩) -->
  <rect x="182" y="182" width="200" height="200" rx="32" fill="#141824" stroke="#ECEFF4" stroke-width="16" stroke-linejoin="round"/>
  
  <!-- 교차 지점의 포인트 앵커 (Signal Red) -->
  <circle cx="282" cy="282" r="14" fill="#DE3B26"/>
</svg>
