<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="108" fill="#141824"/>
  
  <!-- 3개의 나란히 늘어선 미니멀 아치 게이트 (수집 슬롯들) -->
  <g fill="none" stroke="#ECEFF4" stroke-width="16" stroke-linecap="round">
    <!-- Left -->
    <path d="M140 360 V220 A40 40 0 0 1 220 220 V360" stroke-opacity="0.4"/>
    
    <!-- Center (Signal Red Accent #DE3B26) -->
