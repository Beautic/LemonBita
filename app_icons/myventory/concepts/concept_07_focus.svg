<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#F2F1ED"/>
  
  <!-- 아웃라인 격자 프레임 -->
  <rect x="106" y="106" width="300" height="300" rx="32" fill="none" stroke="#121213" stroke-width="20" stroke-linejoin="round"/>
  
  <!-- 조준 십자선 (타겟팅) -->
  <g stroke="#121213" stroke-width="16" stroke-linecap="round">
    <line x1="256" y1="60" x2="256" y2="130"/>
    <line x1="256" y1="382" x2="256" y2="452"/>
    <line x1="60" y1="256" x2="130" y2="256"/>
    <line x1="382" y1="256" x2="452" y2="256"/>
  </g>
  
  <!-- 중앙 액센트 수집 스팟: Signal (#DE3B26) -->
  <circle cx="256" cy="256" r="48" fill="#DE3B26"/>
  <!-- 내부 조준 보조 원 -->
  <circle cx="256" cy="256" r="96" fill="none" stroke="#121213" stroke-width="8" stroke-dasharray="1 16" stroke-linecap="round"/>
</svg>
