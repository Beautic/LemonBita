<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 배경: Bone (#F2F1ED) -->
  <rect width="512" height="512" fill="#F2F1ED"/>
  
  <!-- 격자 매트릭스 슬롯: Ink (#121213) 및 Signal (#DE3B26) -->
  <g fill="none" stroke="#121213" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Row 1 -->
    <rect x="116" y="116" width="76" height="76" rx="16"/>
    <rect x="218" y="116" width="76" height="76" rx="16"/>
    <rect x="320" y="116" width="76" height="76" rx="16"/>
    
    <!-- Row 2 -->
    <rect x="116" y="218" width="76" height="76" rx="16"/>
    <!-- 중앙 슬롯: 비어있거나 수집 진행중인 느낌으로 점선 처리 -->
    <rect x="218" y="218" width="76" height="76" rx="16" stroke-dasharray="1 18"/>
    <rect x="320" y="218" width="76" height="76" rx="16"/>
    
    <!-- Row 3 -->
    <rect x="116" y="320" width="76" height="76" rx="16"/>
    <rect x="218" y="320" width="76" height="76" rx="16"/>
    
    <!-- 액센트 슬롯: Signal (#DE3B26) 단색 채우기로 인벤토리 획득 강조 -->
    <rect x="320" y="320" width="76" height="76" rx="16" fill="#DE3B26" stroke="#DE3B26"/>
  </g>
</svg>
